<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>WebFood</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

<!-- 🔥 HEADER -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🍔 WebFood</span>

    <div>
        <button class="btn btn-outline-light me-2" onclick="navigate('menu')">Menu</button>
        <button class="btn btn-outline-light me-2" onclick="navigate('cart')">Cart</button>
        <button class="btn btn-outline-light me-2" onclick="navigate('orders')">Orders</button>
    </div>

    <div id="auth-area"></div>
</nav>

<!-- 🔥 CONTENT -->
<div class="container mt-4">
    <div id="app"></div>
</div>

<!-- JS -->
<script src="assets/js/api.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/user.js"></script>
<script src="assets/js/admin.js"></script>
<script src="assets/js/staff.js"></script>
<script src="assets/js/shipper.js"></script>

<script>
// ================= ROUTES =================
const routes = {
    menu: "pages/user/menu.html",
    cart: "pages/user/cart.html",
    orders: "pages/user/orders.html",

    login: "pages/auth/login.html",
    register: "pages/auth/register.html",

    admin: "pages/admin/orders.html",
    staff: "pages/staff/orders.html",
    shipper: "pages/shipper/available.html"
};

// ================= ROUTER =================
async function navigate(page) {
    const res = await fetch(routes[page]);
    const html = await res.text();

    document.getElementById("app").innerHTML = html;

    runPageScript(page);
}

// ================= LOAD SCRIPT =================
function runPageScript(page) {
    if (page === "menu") loadFoods();
    if (page === "cart") loadCart();
    if (page === "orders") loadOrders();

    if (page === "admin") loadOrders();
    if (page === "staff") loadStaffOrders();
    if (page === "shipper") loadAvailable();
}

// ================= AUTH UI =================
function renderAuth() {
    const token = localStorage.getItem("token");

    if (!token) {
        document.getElementById("auth-area").innerHTML = `
            <button class="btn btn-success me-2" onclick="navigate('login')">Login</button>
            <button class="btn btn-primary" onclick="navigate('register')">Register</button>
        `;
    } else {
        document.getElementById("auth-area").innerHTML = `
            <button class="btn btn-warning me-2" onclick="navigate('admin')">Admin</button>
            <button class="btn btn-info me-2" onclick="navigate('staff')">Staff</button>
            <button class="btn btn-secondary me-2" onclick="navigate('shipper')">Shipper</button>
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        `;
    }
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", () => {
    renderAuth();
    navigate("menu");
});
</script>

</body>
</html>
